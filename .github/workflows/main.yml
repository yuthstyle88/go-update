name: Build & Deploy Go App

on:
  push:
    branches: [ "dev" ]
jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      BASE_NAME: go-updater
      APP_PORT: ${{ vars.APP_PORT }}
      APP_PATH: ${{ vars.APP_PATH }}

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔧 Setup Go
      uses: actions/setup-go@v5.5.0
      with:
        go-version: "1.24.3"
    - name: Set APP_NAME
      run: echo "APP_NAME=${{ env.BASE_NAME }}-development" >> $GITHUB_ENV

    - name: 🛠️ Build app and define APP_NAME
      run: |
        mkdir -p bin
        go build -ldflags="-w -s" -o bin/${{ env.APP_NAME }}
        chmod +x bin/${{ env.APP_NAME }}
    - name: 📄 Create .env file
      run: |
        cat << EOF > .env
        APP_PORT=${{ env.APP_PORT }}
        ENVIRONMENT="${{ inputs.environment }}"
        EOF
    - name: 📄 Create .secrets file
      run: |
        cat << EOF > .secrets
        export AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}'
        export AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}'
        export AWS_REGION='us-east-1'
        export DYNAMODB_ENDPOINT='http://localhost:4565'
        EOF

    - name: 🔐 Setup SSH
      uses: webfactory/ssh-agent@v0.9.1
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    - name: 🗝️ Add SSH host key to known_hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

    - name: 🚚 Deploy files to server
      run: |
        echo "Copy file to  Server Deploy"
        scp -P ${{ secrets.SSH_PORT }} .env .secrets \
            bin/${{ env.APP_NAME }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.APP_PATH }}/  

    - name: 🚀 Restart app on server (no basename)
      run : |
        ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
         set -e
  
          cd /var/www/dev/go-updater
          
          echo "=== ตรวจสอบ process เก่า ==="
          PIDS=$(pgrep -f "./go-updater-development" || true)
          if [ -n "$PIDS" ]; then
               echo "Killing old processes: $PIDS"
               kill -9 $PIDS
               sleep 1
             else
               echo "No old process found"
          fi
          
          echo "=== โหลด secrets ==="
          if [ ! -f ".secrets" ]; then
             echo "ไม่เจอไฟล์ .secrets"
             exit 1
          fi
          
          source .secrets
          
          echo "=== ตรวจสอบ executable ==="
          if [ ! -x "go-updater-development" ]; then
             echo "เพิ่มสิทธิ์รันให้ go-updater-development"
             chmod +x go-updater-development
          fi
          
          echo "=== Start new process ==="
          nohup ./go-updater-development > app.log 2>&1 &
          echo "Restart สำเร็จ"
        EOF
    - name: Run health check and send webhook
      run: |
        STATUS=$(curl -v --max-time 2 -o /dev/null -s -w "%{http_code}" http://localhost:8191/health)        
        echo "Health status: $STATUS"
 
