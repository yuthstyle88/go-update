name: Build & Deploy Go App

on:
  push:
    branches: [ "dev" ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      BASE_NAME: go-updater
      APP_PORT: ${{ vars.APP_PORT }}
      APP_PATH: ${{ vars.APP_PATH }}

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔧 Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.21.0"

    - name: 🛠️ Build app and define APP_NAME
      run: |
        echo "APP_NAME=${BASE_NAME}-${{ inputs.environment }}" >> $GITHUB_ENV
        mkdir -p bin
        go build -ldflags="-w -s" -o bin/${BASE_NAME}-${{ inputs.environment }}
        chmod +x bin/${BASE_NAME}-${{ inputs.environment }}

    - name: 📄 Create .env file
      uses: SpicyPizza/create-envfile@v2.0
      with:
        envkey_APP_NAME: ${{ env.APP_NAME }}
        envkey_APP_PORT: ${{ env.APP_PORT }}
        envkey_ENVIRONMENT: ${{ inputs.environment }}
        file_name: .env

    - name: 📄 Create .secrets file
      run: |
        cat << EOF > .secrets
        export AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}'
        export AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}'
        export AWS_REGION='us-east-1'
        export DYNAMODB_ENDPOINT='http://localhost:4565'
        EOF

    - name: 🔐 Setup SSH
      uses: webfactory/ssh-agent@v0.8.1
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: 🚚 Deploy files to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        port: ${{ secrets.SSH_PORT }}
        source: ".env,.secrets,bin/${{ env.APP_NAME }}"
        target: "${{ env.APP_PATH }}"

    - name: 🚀 Restart app on server (no basename)
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          set -e
          cd ${{ env.APP_PATH }}

          # 🛑 Stop old process if exists
          if pgrep -f "./${{ env.APP_NAME }}" > /dev/null; then
            echo "Stopping old process..."
            pkill -f "./${{ env.APP_NAME }}"
            sleep 1
          fi

          # 🔐 Load secrets
          source .secrets

          # 🚀 Start new process
          echo "Starting new process: ./${{ env.APP_NAME }}"
          nohup ./${{ env.APP_NAME }} > /dev/null 2>&1 &