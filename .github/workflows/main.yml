name: Build & Deploy Go App

on:
  push:
    branches: [ "dev" ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      BASE_NAME: go-updater
      APP_PORT: ${{ vars.APP_PORT }}
      APP_PATH: ${{ vars.APP_PATH }}

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔧 Setup Go
      uses: actions/setup-go@v5.5.0
      with:
        go-version: "1.24.3"

    - name: 🛠️ Build app and define APP_NAME
      run: |
        echo "APP_NAME=${BASE_NAME}-${{ inputs.environment }}" >> $GITHUB_ENV
        mkdir -p bin
        go build -ldflags="-w -s" -o bin/${BASE_NAME}-${{ inputs.environment }}
        chmod +x bin/${BASE_NAME}-${{ inputs.environment }}

    - name: 📄 Create .env file
      uses: SpicyPizza/create-envfile@v2.0
      with:
        envkey_APP_NAME: ${{ env.APP_NAME }}
        envkey_APP_PORT: ${{ env.APP_PORT }}
        envkey_ENVIRONMENT: ${{ inputs.environment }}
        file_name: .env

    - name: 📄 Create .secrets file
      run: |
        cat << EOF > .secrets
        export AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}'
        export AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}'
        export AWS_REGION='us-east-1'
        export DYNAMODB_ENDPOINT='http://localhost:4565'
        EOF

    - name: 🔐 Setup SSH
      uses: webfactory/ssh-agent@v0.9.1
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: 🚚 Deploy files to server
      run: |
        echo "Copy file to  Server Deploy"
        scp -P ${{ secrets.SSH_PORT }} .env .secrets \
            bin/${{ env.APP_NAME }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.APP_PATH }}/  

    - name: 🚀 Restart app on server (no basename)
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          set -e
          cd ${{ env.APP_PATH }}

          # 🛑 Stop old process if exists
          if pgrep -f "./${{ env.APP_NAME }}" > /dev/null; then
            echo "Stopping old process..."
            pkill -f "./${{ env.APP_NAME }}"
            sleep 1
          fi

          # 🔐 Load secrets
          source .secrets

          # 🚀 Start new process
          echo "Starting new process: ./${{ env.APP_NAME }}"
          nohup ./${{ env.APP_NAME }} > /dev/null 2>&1 &

    - name: Run health check and send webhook
      run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ vars.APP_PORT }}/health)

          if [ "$STATUS" -eq 200 ]; then
            curl -X POST ${{ secrets.WEBHOOK_URL }} \
              -H "Content-Type: application/json" \
              -d '{"status":"OK","message":"✅ Health check passed"}'
          else
            curl -X POST ${{ secrets.WEBHOOK_URL }} \
              -H "Content-Type: application/json" \
              -d '{"status":"FAIL","message":"❌ Health check failed with status '$STATUS'"}'
            exit 1
          fi      
